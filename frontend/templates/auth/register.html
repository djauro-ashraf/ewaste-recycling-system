{% extends "base.html" %}
{% block title %}Register — EWaste RMS{% endblock %}
{% block content %}
<div style="max-width:480px;margin:40px auto">
  <div class="page-header"><h1 class="page-title">Create Account</h1></div>
  <div class="card" style="padding:24px">
    <form method="POST">
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input name="full_name" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input name="username" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input name="phone" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">City</label>
          <input name="city" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-input" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-textarea" rows="2" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-full">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-dim)">
      Have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
