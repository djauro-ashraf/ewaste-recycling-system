{% extends "base.html" %}
{% block title %}Login — EWaste RMS{% endblock %}
{% block content %}
<div style="max-width:380px;margin:60px auto">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:32px;margin-bottom:8px">♻</div>
    <h1 style="font-size:20px;font-weight:700;color:var(--silver-ll)">EWaste RMS</h1>
    <p style="font-size:13px;color:var(--text-dim);margin-top:4px">Recycling Management System</p>
  </div>
  <div class="card" style="padding:24px">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input name="username" class="form-input" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-dim)">
      No account? <a href="{{ url_for('register') }}" style="color:var(--accent)">Register</a>
    </p>
  </div>
</div>
{% endblock %}
